<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduTech Nexus | Commander Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        db: {
                            bg: '#030305',
                            panel: '#08080C',
                            border: '#1A1A2A',
                            text: '#717182',
                            highlight: '#FBFBFC',
                            cyan: '#00f2ff',
                            violet: '#7000ff',
                            danger: '#ff003c'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(0,242,255,0.08), transparent 25%),
                radial-gradient(circle at bottom right, rgba(112,0,255,0.08), transparent 25%),
                #030305;
            color: #717182;
            overflow: hidden;
        }

        .cyber-grid::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #00f2ff, #7000ff);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        .glass-panel {
            background: rgba(8, 8, 12, 0.75);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow:
                0 0 30px rgba(0,242,255,0.03),
                inset 0 -1px 0 rgba(255,255,255,0.03);
        }

        aside {
            background:
                linear-gradient(180deg, rgba(10,10,16,0.96), rgba(5,5,8,0.98));
        }

        table {
            border-spacing: 0 10px;
        }

        tbody tr {
            transition: all .25s ease;
            border-left: 3px solid transparent;
        }

        .row-hover:hover {
            background:
                linear-gradient(90deg,
                    rgba(0,242,255,0.08),
                    rgba(112,0,255,0.03)
                );
            transform: translateY(-2px) scale(1.002);
            box-shadow:
                0 0 20px rgba(0,242,255,0.04),
                inset 0 0 0 1px rgba(0,242,255,0.08);
        }

        .row-selected {
            background:
                linear-gradient(90deg,
                    rgba(0,242,255,0.12),
                    rgba(112,0,255,0.05)
                ) !important;
            border-left: 3px solid #00f2ff;
            box-shadow:
                0 0 25px rgba(0,242,255,0.08),
                inset 0 0 0 1px rgba(0,242,255,0.12);
        }

        th {
            backdrop-filter: blur(20px);
        }

        td {
            position: relative;
        }

        input,
        textarea {
            transition: all .25s ease;
        }

        input:focus,
        textarea:focus {
            box-shadow:
                0 0 0 1px rgba(0,242,255,0.3),
                0 0 20px rgba(0,242,255,0.08);
            background: rgba(255,255,255,0.02);
        }

        button {
            transition: all .25s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.08),
                transparent
            );
            transform: translateX(-100%);
            transition: .6s;
        }

        button:hover::before {
            transform: translateX(100%);
        }

        button:hover {
            transform: translateY(-1px);
        }

        #inspector {
            background:
                linear-gradient(
                    180deg,
                    rgba(8,8,12,0.98),
                    rgba(5,5,8,0.99)
                );
            box-shadow:
                -10px 0 40px rgba(0,0,0,0.45),
                inset 1px 0 0 rgba(255,255,255,0.03);
        }

        #editModal {
            backdrop-filter: blur(18px);
        }

        #editModal > div {
            background:
                linear-gradient(
                    180deg,
                    rgba(10,10,16,0.98),
                    rgba(5,5,8,0.98)
                );
            box-shadow:
                0 0 60px rgba(0,242,255,0.08),
                0 0 120px rgba(112,0,255,0.08);
        }

        .neon-border {
            position: relative;
        }

        .neon-border::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(
                135deg,
                rgba(0,242,255,0.3),
                rgba(112,0,255,0.25)
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            pointer-events: none;
        }

        @keyframes pulseFlow {
            0% {
                box-shadow: 0 0 0 0 rgba(0,242,255,0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(0,242,255,0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0,242,255,0);
            }
        }

        .pulse-dot {
            animation: pulseFlow 1.5s infinite;
        }

        @keyframes floatUI {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-2px); }
            100% { transform: translateY(0px); }
        }

        .floating-ui {
            animation: floatUI 4s ease-in-out infinite;
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden cyber-grid">

<header class="h-14 glass-panel flex items-center justify-between px-6 z-50 floating-ui">

    <div class="flex items-center gap-4">
        <div class="font-bold text-db-highlight text-lg">
            <span class="text-db-cyan">NEXUS</span> COMMANDER PRO
        </div>

        <div class="h-4 w-px bg-db-border"></div>

        <div class="text-[10px] font-mono text-db-cyan bg-db-cyan/5 px-2.5 py-1 rounded-full border border-db-cyan/15 flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-db-cyan pulse-dot"></span>
            ONLINE_SYNC
        </div>
    </div>

</header>

<div class="flex flex-1 overflow-hidden z-10">

    <aside class="w-72 border-r border-db-border flex flex-col p-5">

        <input
            type="text"
            id="nexusSearch"
            placeholder="Filtro Live..."
            class="w-full bg-db-bg/40 border border-db-border rounded-xl px-4 py-3 text-xs focus:outline-none focus:border-db-cyan text-db-highlight mb-6 neon-border"
        >

        <nav class="space-y-1.5">
            <p class="text-[10px] font-bold text-db-text/30 uppercase tracking-widest px-2 mb-2">
                Vista Nexus
            </p>

            <a href="index.html"
               class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/[0.03] text-db-text hover:text-db-highlight transition-all">
                <span>🎴</span>
                Interfaz Cards
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 rounded-xl bg-db-cyan/5 text-db-cyan border border-db-cyan/15 font-semibold">
                <span>📊</span>
                Explorador de Datos
            </a>
        </nav>

        <div class="mt-auto pt-5 border-t border-db-border grid grid-cols-2 gap-2.5">

            <a href="http://localhost:8080/swagger-ui/index.html"
               target="_blank"
               class="p-2.5 bg-db-bg border border-db-border rounded-xl text-center text-[10px] hover:border-db-cyan text-db-highlight transition-all">
                SWAGGER
            </a>

            <a href="http://localhost:8080/h2-console"
               target="_blank"
               class="p-2.5 bg-db-bg border border-db-border rounded-xl text-center text-[10px] hover:border-db-cyan text-db-highlight transition-all">
                H2 SQL
            </a>

        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-db-bg relative">

        <div class="flex-1 overflow-auto">

            <table class="w-full text-left border-collapse">

                <thead class="sticky top-0 z-10 glass-panel border-b border-db-border text-[10px] text-db-text uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Título_Curso</th>
                        <th class="px-6 py-4">Descripción</th>
                        <th class="px-6 py-4 text-center">Nº Lec</th>
                    </tr>
                </thead>

                <tbody class="divide-y divide-db-border/20 font-mono text-xs" id="table-body"></tbody>

            </table>

        </div>

    </main>

    <aside id="inspector"
           class="w-[420px] border-l border-db-border hidden flex-col">

        <div class="p-6 border-b border-db-border flex justify-between items-center relative">

            <img
                src="https://images.unsplash.com/photo-1639762681057-408e52192e55?q=80&w=400&auto=format&fit=crop"
                class="absolute inset-0 w-full h-full object-cover opacity-10"
            >

            <h2 class="font-bold text-db-highlight uppercase z-10">
                Inspector Nodo
            </h2>

            <button onclick="cerrarInspector()"
                    class="text-db-text hover:text-white z-10">
                ✕
            </button>

        </div>

        <div class="flex-1 overflow-y-auto p-7 space-y-6"
             id="inspector-content">
        </div>

    </aside>

</div>

<div id="editModal"
     class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center">

    <div class="border border-db-cyan/30 p-8 rounded-2xl w-[500px]">

        <h2 class="text-xl font-bold text-db-highlight mb-6">
            MODIFICAR CONFIG NODO
            <span id="modal-id" class="text-db-cyan"></span>
        </h2>

        <form id="editForm" onsubmit="guardarEdicion(event)">

            <input type="hidden" id="edit-id">

            <div class="space-y-4">

                <div>
                    <label class="block text-[10px] font-mono text-db-text uppercase mb-2">
                        Título del Curso
                    </label>

                    <input
                        type="text"
                        id="edit-titulo"
                        required
                        class="w-full bg-db-bg border border-db-border rounded-xl p-3 text-sm text-db-highlight focus:border-db-cyan outline-none"
                    >
                </div>

                <div>
                    <label class="block text-[10px] font-mono text-db-text uppercase mb-2">
                        Descripción
                    </label>

                    <textarea
                        id="edit-descripcion"
                        rows="4"
                        class="w-full bg-db-bg border border-db-border rounded-xl p-3 text-sm text-db-highlight focus:border-db-cyan outline-none"
                    ></textarea>
                </div>

            </div>

            <div class="flex gap-4 mt-8">

                <button
                    type="button"
                    onclick="cerrarModal()"
                    class="flex-1 py-3 border border-db-border text-db-text hover:bg-white/5 rounded-xl font-bold text-xs uppercase">
                    Cancelar
                </button>

                <button
                    type="submit"
                    class="flex-1 py-3 bg-gradient-to-r from-db-violet to-db-cyan text-white rounded-xl font-bold text-xs uppercase hover:scale-[1.02] transition-all shadow-2xl shadow-db-violet/20">
                    Guardar Cambios
                </button>

            </div>

        </form>

    </div>

</div>

<script>

    let cursosCache = [];

    document.getElementById('nexusSearch').addEventListener('input', (e) => {

        const t = e.target.value.toLowerCase();

        renderizarTabla(
            cursosCache.filter(c =>
                c.titulo.toLowerCase().includes(t) ||
                (c.descripcion && c.descripcion.toLowerCase().includes(t))
            )
        );

    });

    async function cargarDatosApi() {

        try {

            const res = await fetch('http://localhost:8080/api/cursos');

            cursosCache = await res.json();

            renderizarTabla(cursosCache);

            cerrarInspector();

        } catch (e) {

            document.getElementById('table-body').innerHTML = `
                <tr>
                    <td colspan="4"
                        class="p-10 text-center text-db-danger">
                        ERROR API (Verifica servidor y CORS)
                    </td>
                </tr>
            `;

        }

    }

    function renderizarTabla(lista) {

        document.getElementById('table-body').innerHTML = lista.map(curso => `

            <tr
                class="row-hover cursor-pointer border-b border-db-border/30"
                onclick="abrirInspector(${curso.id}, event)"
            >

                <td class="px-6 py-4 text-db-cyan font-bold">
                    ${curso.id}
                </td>

                <td class="px-6 py-4 font-bold text-white">
                    ${curso.titulo}
                </td>

                <td class="px-6 py-4 text-db-text max-w-[200px] truncate">
                    ${curso.descripcion || ''}
                </td>

                <td class="px-6 py-4 text-center">
                    <span class="bg-white/5 px-2 py-1 rounded text-[10px]">
                        ${curso.lecciones ? curso.lecciones.length : 0}
                    </span>
                </td>

            </tr>

        `).join('');

    }

    function abrirInspector(id, event) {

        const curso = cursosCache.find(c => c.id === id);

        document.getElementById('inspector').style.display = 'flex';

        document.querySelectorAll('tr').forEach(tr => {
            tr.classList.remove('row-selected');
        });

        if (event && event.currentTarget) {
            event.currentTarget.classList.add('row-selected');
        }

        const leccionesHTML =
            curso.lecciones && curso.lecciones.length > 0

            ? curso.lecciones.map((l, i) => `

                <div class="p-3 bg-db-bg border border-db-border rounded-xl flex gap-3 items-center hover:border-db-cyan transition-colors mb-2">

                    <span class="text-[10px] font-mono text-db-text font-bold bg-white/5 w-6 h-6 rounded flex items-center justify-center">
                        ${String(i+1).padStart(2, '0')}
                    </span>

                    <div class="flex-1 overflow-hidden">

                        <p class="text-xs font-semibold text-db-highlight truncate">
                            ${l.titulo}
                        </p>

                    </div>

                </div>

            `).join('')

            : `
                <p class="text-xs text-db-text italic p-4 text-center bg-white/5 rounded border border-dashed border-db-border">
                    Sin lecciones.
                </p>
            `;

        document.getElementById('inspector-content').innerHTML = `

            <div class="space-y-2">

                <label class="text-[10px] font-mono text-db-text uppercase tracking-widest font-semibold">
                    Nodo::${curso.id}
                </label>

                <h3 class="text-2xl font-extrabold text-db-highlight leading-tight">
                    ${curso.titulo}
                </h3>

            </div>

            <div class="p-4 bg-white/[0.03] border border-white/5 rounded-2xl backdrop-blur-xl">

                <p class="text-[10px] text-db-text font-mono uppercase mb-2">
                    Abstract_Técnico
                </p>

                <p class="text-sm text-db-highlight leading-relaxed">
                    ${curso.descripcion || 'Sin descripción'}
                </p>

            </div>

            <div class="space-y-3">

                <div class="flex justify-between items-center">

                    <p class="text-[10px] text-db-text font-mono uppercase tracking-widest font-semibold">
                        Lecciones
                    </p>

                    <span class="text-[10px] font-sans bg-db-violet/10 text-db-violet px-2 py-1 rounded-full border border-db-violet/15">
                        ${curso.lecciones ? curso.lecciones.length : 0} L
                    </span>

                </div>

                <div class="max-h-40 overflow-y-auto pr-2">
                    ${leccionesHTML}
                </div>

            </div>

            <div class="pt-4 border-t border-db-border space-y-3 mt-4">

                <button
                    onclick="abrirModal(${curso.id})"
                    class="w-full py-3 bg-gradient-to-r from-db-violet to-db-cyan text-white rounded-xl font-bold text-xs uppercase hover:scale-[1.02] transition-all shadow-2xl shadow-db-violet/20">
                    Modificar Config Nodo
                </button>

                <button
                    onclick="eliminarCurso(${curso.id})"
                    class="w-full py-3 border border-db-danger/30 text-db-danger hover:bg-db-danger/10 rounded-xl font-bold text-xs uppercase transition-all">
                    Destruir Nodo (Delete)
                </button>

            </div>

        `;

    }

    function cerrarInspector() {
        document.getElementById('inspector').style.display = 'none';
    }

    function abrirModal(id) {

        const curso = cursosCache.find(c => c.id === id);

        document.getElementById('edit-id').value = curso.id;
        document.getElementById('modal-id').innerText = `[${curso.id}]`;
        document.getElementById('edit-titulo').value = curso.titulo;
        document.getElementById('edit-descripcion').value = curso.descripcion || '';
        document.getElementById('editModal').style.display = 'flex';

    }

    function cerrarModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    async function guardarEdicion(e) {

        e.preventDefault();

        const id = document.getElementById('edit-id').value;

        const datosNuevos = {
            titulo: document.getElementById('edit-titulo').value,
            descripcion: document.getElementById('edit-descripcion').value
        };

        try {

            await fetch(`http://localhost:8080/api/cursos/${id}`, {

                method: 'PUT',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify(datosNuevos)

            });

            cerrarModal();

            cargarDatosApi();

        } catch (err) {

            alert('Error al actualizar');

        }

    }

    async function eliminarCurso(id) {

        if (confirm("⚠ PRECAUCIÓN: ¿Seguro que quieres borrar este curso para siempre?")) {

            try {

                await fetch(`http://localhost:8080/api/cursos/${id}`, {
                    method: 'DELETE'
                });

                cargarDatosApi();

            } catch (err) {

                alert('Error al eliminar. Revisa DELETE.');

            }

        }

    }

    cargarDatosApi();

</script>

</body>
</html>
